# EPIC 2 UAT scenarios - Constraint Engine
# Run with: ./uat/uat.sh
# or:        python3 uat/runner.py --base-url http://localhost:8000

scenarios:

  - name: echo_basic
    description: Normal echo request should succeed
    request:
      task_type: echo
      payload:
        message: hello from UAT
    expectation: >
      The agent should return HTTP 200, status=success,
      and the result should contain the echoed payload unchanged
      (message: "hello from UAT").

  - name: echo_with_evidence
    description: Echo with evidence attachments should return evidence in response
    request:
      task_type: echo
      payload:
        message: test with evidence
        evidence:
          - source_id: doc-001
            source_type: pdf
            location: p.1
            snippet: Introduction paragraph
            score: 0.95
    expectation: >
      The agent should return HTTP 200, status=success.
      The response evidence list should contain one item
      with source_id="doc-001".

  - name: oversized_payload_rejected
    description: Payload exceeding 64KB should be rejected with E-EXEC-005
    request:
      task_type: echo
      payload_size_bytes: 70000
    expectation: >
      The agent should return HTTP 200 (the API always returns 200).
      The response status field should be "error".
      The error.code should be "E-EXEC-005".
      The result should be an empty object {}.

  - name: unsupported_task_type
    description: Unknown task type should return E-EXEC-001
    request:
      task_type: unknown_task
      payload:
        input: test
    expectation: >
      The agent should return status=error with error.code=E-EXEC-001
      (UnsupportedTask). The error should be non-recoverable (recoverable=false).

  - name: local_privacy_echo
    description: privacy_level=local with echo task should pass (echo is not network-dependent)
    request:
      task_type: echo
      privacy_level: local
      payload:
        message: private message
    expectation: >
      The agent should return status=success.
      echo is not a network-dependent task, so local privacy should not block it.
      Result should contain the echoed payload.

  - name: health_check
    description: Agent liveness check via echo
    request:
      task_type: echo
      payload:
        message: ping
    expectation: >
      The agent should return status=success.
      This is a liveness check: if the agent responds at all with status=success, this passes.
